<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#111;
  color:white;
  font-family:sans-serif;
}

#ui{
position:absolute;
top:10px;
left:10px;
z-index:10;
}

canvas{
display:block;
} </style>

</head>

<body>

<div id="ui">
  <h3>🔥 技能战斗游戏</h3>
  <div>金币：<span id="gold">0</span></div>
</div>

<canvas id="c"></canvas>

<script>
let ws = new WebSocket("wss://game-server-production-0e42.up.railway.app");

let players={},skills=[],texts=[];
let myId=null;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// 🔥 自动全屏
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

ws.onmessage = e=>{
  let data = JSON.parse(e.data);
  players = data.players;
  skills = data.skills;
  texts = data.texts;

  if(!myId){
    myId = Object.keys(players)[0];
  }

  if(players[myId]){
    document.getElementById("gold").innerText = players[myId].gold || 0;
  }
};

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 玩家
  for(let id in players){
    let p = players[id];

    ctx.fillStyle="white";
    ctx.fillRect(p.x,p.y,20,20);

    ctx.fillStyle="cyan";
    ctx.fillText(p.name,p.x,p.y-10);

    // 血条
    ctx.fillStyle="red";
    ctx.fillRect(p.x,p.y-5,20,3);
    ctx.fillStyle="lime";
    ctx.fillRect(p.x,p.y-5,20*(p.hp/100),3);
  }

  // 火球
  for(let s of skills){
    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(s.x,s.y,6,0,Math.PI*2);
    ctx.fill();
  }

  // 飘字
  for(let t of texts){
    ctx.fillStyle="yellow";
    ctx.fillText(t.value,t.x,t.y);
  }

  requestAnimationFrame(loop);
}
loop();

// 移动（用鼠标位置）
document.onmousemove=e=>{
  ws.send(JSON.stringify({
    type:"move",
    x:e.clientX,
    y:e.clientY
  }));
};

// 点击释放技能
document.onclick=e=>{
  if(!myId || !players[myId]) return;

  let p = players[myId];

  let dx = e.clientX - p.x;
  let dy = e.clientY - p.y;
  let len = Math.sqrt(dx*dx+dy*dy);

  ws.send(JSON.stringify({
    type:"skill",
    dx: dx/len,
    dy: dy/len
  }));
};
</script>

</body>
</html>
