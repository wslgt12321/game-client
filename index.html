<!DOCTYPE html>

<html>
<body>
<h2>在线多人游戏</h2>
<canvas id="c" width="500" height="400"></canvas>

<script>
let ws = new WebSocket("wss://game-server-production-0e42.up.railway.app");

let players = {};

ws.onmessage = e=>{
  players = JSON.parse(e.data);
};

let ctx = document.getElementById("c").getContext("2d");

function loop(){
  ctx.clearRect(0,0,500,400);

  for(let id in players){
    let p = players[id];

    // 人物
    ctx.fillStyle = "black";
    ctx.fillRect(p.x, p.y, 20, 20);

    // 名字
    ctx.fillStyle = "blue";
    ctx.fillText(p.name, p.x, p.y - 10);

    // 血条背景
    ctx.fillStyle = "red";
    ctx.fillRect(p.x, p.y - 5, 20, 3);

    // 血条
    ctx.fillStyle = "green";
    ctx.fillRect(p.x, p.y - 5, 20 * (p.hp/100), 3);
  }

  requestAnimationFrame(loop);
}
loop();

// 移动
document.onmousemove = e=>{
  ws.send(JSON.stringify({
    type:"move",
    x: e.clientX % 500,
    y: e.clientY % 400
  }));
};

// 攻击（点击）
document.onclick = ()=>{
  ws.send(JSON.stringify({
    type:"attack"
  }));
};
</script>

</body>
</html>
