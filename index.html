<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>图片地图游戏</title>
<style>
html,body{
  margin:0;
  overflow:hidden;
  background:#000;
}
#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}
</style>
</head>

<body>

<div id="ui">
  🌍 图片地图（草地+道路+树）
  <div>金币：<span id="gold">0</span></div>
</div>

<canvas id="c"></canvas>

<script>
let ws = new WebSocket("wss://game-server-production-0e42.up.railway.app");

let players={},skills=[],texts=[],monsters={};
let myId=null;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// ===== 图片资源 =====
let grass = new Image();
grass.src = "https://i.imgur.com/3QZQZ6p.png";

let road = new Image();
road.src = "https://i.imgur.com/8QxYb9R.png";

let tree = new Image();
tree.src = "https://i.imgur.com/9Xn4y7K.png";

// 全屏
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

// 摄像机
let camera = {x:0,y:0};

// 🌳 树（固定世界）
let trees = [];
for(let i=0;i<40;i++){
  trees.push({
    x: Math.random()*2000,
    y: Math.random()*2000,
    size:40
  });
}

// 接收数据
ws.onmessage = e=>{
  let data = JSON.parse(e.data);
  players = data.players || {};
  skills = data.skills || [];
  texts = data.texts || [];
  monsters = data.monsters || {};

  if(!myId){
    myId = Object.keys(players)[0];
  }

  if(players[myId]){
    document.getElementById("gold").innerText = players[myId].gold || 0;

    camera.x = players[myId].x - canvas.width/2;
    camera.y = players[myId].y - canvas.height/2;
  }
};

// 坐标转换
function toScreen(x,y){
  return {x:x-camera.x,y:y-camera.y};
}

// 🚧 碰撞检测（树）
function collide(x,y){
  for(let t of trees){
    let dx = x - t.x;
    let dy = y - t.y;
    if(Math.sqrt(dx*dx+dy*dy) < 30){
      return true;
    }
  }
  return false;
}

// 主循环
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let tile = 64;

  // 🌱 草地铺满
  for(let x=-camera.x%tile; x<canvas.width; x+=tile){
    for(let y=-camera.y%tile; y<canvas.height; y+=tile){
      ctx.drawImage(grass,x,y,tile,tile);
    }
  }

  // 🛣️ 道路（简单生成）
  for(let i=-1000;i<2000;i+=tile){
    let pos = toScreen(i,500);
    ctx.drawImage(road,pos.x,pos.y,tile,tile);
  }

  // 🌳 树
  for(let t of trees){
    let pos = toScreen(t.x,t.y);
    ctx.drawImage(tree,pos.x-20,pos.y-40,40,60);
  }

  // 🧟 怪物
  for(let id in monsters){
    let m = monsters[id];
    let pos = toScreen(m.x,m.y);

    ctx.fillStyle="purple";
    ctx.fillRect(pos.x,pos.y,20,20);
  }

  // 👤 玩家
  for(let id in players){
    let p = players[id];
    let pos = toScreen(p.x,p.y);

    ctx.fillStyle="white";
    ctx.fillRect(pos.x,pos.y,20,20);

    ctx.fillStyle="cyan";
    ctx.fillText(p.name,pos.x,pos.y-10);
  }

  requestAnimationFrame(loop);
}
loop();

// 鼠标移动（带碰撞）
document.onmousemove=e=>{
  if(!myId || !players[myId]) return;

  let nx = e.clientX + camera.x;
  let ny = e.clientY + camera.y;

  if(!collide(nx,ny)){
    ws.send(JSON.stringify({
      type:"move",
      x:nx,
      y:ny
    }));
  }
};

// 技能
document.onclick=e=>{
  if(!myId || !players[myId]) return;

  let p = players[myId];
  let tx = e.clientX + camera.x;
  let ty = e.clientY + camera.y;

  let dx = tx - p.x;
  let dy = ty - p.y;
  let len = Math.sqrt(dx*dx+dy*dy);

  ws.send(JSON.stringify({
    type:"skill",
    dx: dx/len,
    dy: dy/len
  }));
};
</script>

</body>
</html>
