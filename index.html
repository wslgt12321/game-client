<script>
let ws = new WebSocket("wss://game-server-production-0e42.up.railway.app");

let players={},skills=[],texts=[];
let myId=null;

ws.onmessage = e=>{
  let data = JSON.parse(e.data);
  players = data.players;
  skills = data.skills;
  texts = data.texts;

  if(!myId){
    myId = Object.keys(players)[0];
  }
};

let ctx = document.getElementById("c").getContext("2d");

function loop(){
  ctx.clearRect(0,0,500,400);

  // 玩家
  for(let id in players){
    let p = players[id];

    ctx.fillStyle="black";
    ctx.fillRect(p.x,p.y,20,20);

    ctx.fillStyle="blue";
    ctx.fillText(p.name,p.x,p.y-10);

    ctx.fillStyle="red";
    ctx.fillRect(p.x,p.y-5,20,3);
    ctx.fillStyle="green";
    ctx.fillRect(p.x,p.y-5,20*(p.hp/100),3);
  }

  // 🔥 技能（火球）
  for(let s of skills){
    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(s.x,s.y,5,0,Math.PI*2);
    ctx.fill();
  }

  // 💥 飘字
  for(let t of texts){
    ctx.fillStyle="red";
    ctx.fillText(t.value,t.x,t.y);
  }

  requestAnimationFrame(loop);
}
loop();

// 鼠标移动
document.onmousemove=e=>{
  ws.send(JSON.stringify({
    type:"move",
    x:e.clientX%500,
    y:e.clientY%400
  }));
};

// 点击释放技能
document.onclick=e=>{
  if(!myId || !players[myId]) return;

  let p = players[myId];

  let dx = e.clientX - p.x;
  let dy = e.clientY - p.y;
  let len = Math.sqrt(dx*dx+dy*dy);

  ws.send(JSON.stringify({
    type:"skill",
    dx: dx/len,
    dy: dy/len
  }));
};
</script>
