<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<style>
html,body{
  margin:0;
  overflow:hidden;
  background:#0a1f0a;
}
#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}
</style>
</head>

<body>

<div id="ui">
  🌍 刷怪地图
  <div>金币：<span id="gold">0</span></div>
</div>

<canvas id="c"></canvas>

<script>
let ws = new WebSocket("wss://game-server-production-0e42.up.railway.app");

let players={},skills=[],texts=[],monsters={};
let myId=null;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

let camera = {x:0,y:0};

ws.onmessage = e=>{
  let data = JSON.parse(e.data);
  players = data.players;
  skills = data.skills;
  texts = data.texts;
  monsters = data.monsters;

  if(!myId){
    myId = Object.keys(players)[0];
  }

  if(players[myId]){
    document.getElementById("gold").innerText = players[myId].gold || 0;

    camera.x = players[myId].x - canvas.width/2;
    camera.y = players[myId].y - canvas.height/2;
  }
};

function toScreen(x,y){
  return {x:x-camera.x,y:y-camera.y};
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 🌱 草地贴图（伪随机）
  for(let x=-camera.x%40; x<canvas.width; x+=40){
    for(let y=-camera.y%40; y<canvas.height; y+=40){
      ctx.fillStyle = ( (x+y)%80==0 ) ? "#1f5f1f" : "#145214";
      ctx.fillRect(x,y,40,40);
    }
  }

  // 🧟 怪物
  for(let id in monsters){
    let m = monsters[id];
    let pos = toScreen(m.x,m.y);

    ctx.fillStyle="purple";
    ctx.fillRect(pos.x,pos.y,20,20);

    // 血条
    ctx.fillStyle="red";
    ctx.fillRect(pos.x,pos.y-5,20,3);
    ctx.fillStyle="lime";
    ctx.fillRect(pos.x,pos.y-5,20*(m.hp/50),3);
  }

  // 玩家
  for(let id in players){
    let p = players[id];
    let pos = toScreen(p.x,p.y);

    ctx.fillStyle="white";
    ctx.fillRect(pos.x,pos.y,20,20);

    ctx.fillStyle="cyan";
    ctx.fillText(p.name,pos.x,pos.y-10);
  }

  // 技能
  for(let s of skills){
    let pos = toScreen(s.x,s.y);
    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(pos.x,pos.y,6,0,Math.PI*2);
    ctx.fill();
  }

  // 飘字
  for(let t of texts){
    let pos = toScreen(t.x,t.y);
    ctx.fillStyle="yellow";
    ctx.fillText(t.value,pos.x,pos.y);
  }

  requestAnimationFrame(loop);
}
loop();

// 坐标转换
function worldPos(e){
  return {
    x: e.clientX + camera.x,
    y: e.clientY + camera.y
  };
}

document.onmousemove=e=>{
  let pos = worldPos(e);
  ws.send(JSON.stringify({
    type:"move",
    x:pos.x,
    y:pos.y
  }));
};

document.onclick=e=>{
  if(!myId || !players[myId]) return;

  let p = players[myId];
  let target = worldPos(e);

  let dx = target.x - p.x;
  let dy = target.y - p.y;
  let len = Math.sqrt(dx*dx+dy*dy);

  ws.send(JSON.stringify({
    type:"skill",
    dx: dx/len,
    dy: dy/len
  }));
};
</script>

</body>
</html>
